# ── HTTP — redirect all traffic to HTTPS, serve ACME challenges ──────────────
server {
    listen 80;
    server_name ceo.aura-intelligence.ch;

    # Certbot / Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — split routing: Next.js frontend + FastAPI bridge ─────────────────
server {
    listen 443 ssl;
    server_name ceo.aura-intelligence.ch;

    ssl_certificate     /etc/letsencrypt/live/ceo.aura-intelligence.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ceo.aura-intelligence.ch/privkey.pem;

    # Modern TLS only — required for WebXR on iOS and Android
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Allow large GLB uploads (150 MB) — only matters on /api/ routes
    client_max_body_size 150m;

    # ── FastAPI: upload endpoint ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── FastAPI: health check ─────────────────────────────────────────────
    location = /health {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI: AR viewer pages (/view/<uuid>) ───────────────────────────
    location /view/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── FastAPI: GLB model file serving (/models/<file>) ─────────────────
    location /models/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Next.js frontend (everything else, including /_next/static/) ──────
    location / {
        # host-gateway resolves to the Docker host IP (172.17.0.1 typically)
        proxy_pass         http://host-gateway:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js dev HMR + general)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 60s;
    }
}
