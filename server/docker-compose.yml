version: "3.9"

services:
  # ── PostgreSQL — Aura Monolith DB ─────────────────────────────────────────
  # NOT exposed to the internet: only accessible on the internal Docker network.
  # Persistent data lives in the named volume "pg_data" — safe across restarts.
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-aura_secret}" # override in .env
      POSTGRES_DB: aura
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro # auto-run on first start
    # No "ports:" — intentionally not exposed outside the Docker network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build: .
    restart: always
    environment:
      - N8N_WEBHOOK_URL=https://aura-intelligence.ch/webhook/verify-key
      - PUBLIC_DOMAIN=ceo.aura-intelligence.ch
      - FILES_DIR=/data/models
      # Internal DB URL — only reachable from inside the Docker network
      - DATABASE_URL=postgresql://aura:${POSTGRES_PASSWORD:-aura_secret}@db:5432/aura
      - AURA_HMAC_SALT=${AURA_HMAC_SALT:-aura-salt} # override in .env for production
    volumes:
      - model_data:/data/models
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy (HTTP + HTTPS) ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      - api

  # ── Certbot — auto-renew SSL certificate every 12 h ───────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $$!;
      done"

volumes:
  model_data:
  pg_data: # Postgres persistent storage
  certbot_www:
